<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#ff6b35" stroke-width="2"/>
  
  <!-- Fork and knife crossed (restaurant icon) -->
  <g transform="translate(100, 100)">
    <!-- Fork (left) -->
    <g transform="translate(-20, 0) rotate(-15)">
      <!-- Fork handle -->
      <rect x="-3" y="-40" width="6" height="50" fill="#ff6b35" rx="3"/>
      <!-- Fork prongs -->
      <rect x="-20" y="10" width="4" height="30" fill="#ff6b35" rx="2"/>
      <rect x="-7" y="10" width="4" height="30" fill="#ff6b35" rx="2"/>
      <rect x="6" y="10" width="4" height="30" fill="#ff6b35" rx="2"/>
      <!-- Fork prong connectors -->
      <rect x="-20" y="8" width="30" height="4" fill="#ff6b35" rx="2"/>
    </g>
    
    <!-- Knife (right) -->
    <g transform="translate(20, 0) rotate(15)">
      <!-- Knife handle -->
      <rect x="-3" y="-40" width="6" height="50" fill="#ff6b35" rx="3"/>
      <!-- Knife blade -->
      <polygon points="0,-5 -8,35 0,40 8,35" fill="#ff6b35" opacity="0.9"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ff6b35" text-anchor="middle">RestroWatch</text>
</svg>
